<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DF72F2A6 y SIREC</title>
    <!-- CSS Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #f2f7f5; /* Tono IMSS suave */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        /* Card Container */
        .cards-container {
            width: 100%;
            padding: 20px;
        }

        /* Menu Cards */
        .menu-card {
            background-color: white;
            border-radius: 16px;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            height: 100%;
            overflow: hidden;
            border-top: 5px solid transparent;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }
        
        .menu-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(19, 78, 57, 0.15);
            text-decoration: none;
            color: inherit;
        }

        .card-citas { border-top-color: #134e39; }
        .card-sirec { border-top-color: #006455; }

        .menu-card h3 {
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 1.8rem;
            text-align: center;
        }

        .btn-view {
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 1rem;
            display: inline-block;
            transition: all 0.3s;
        }

        .card-citas .btn-view {
            background-color: transparent;
            color: #134e39;
            border: 2px solid #134e39;
        }
        .card-citas:hover .btn-view {
            background-color: #134e39;
            color: white;
        }

        .card-sirec .btn-view {
            background-color: transparent;
            color: #006455;
            border: 2px solid #006455;
        }
        .card-sirec:hover .btn-view {
            background-color: #006455;
            color: white;
        }
    </style>
</head>
<body>

    <div class="container cards-container">
        <div class="row justify-content-center">
            
            <!-- Tarjeta 1: DF72F2A6 -->
            <div class="col-md-5 col-lg-4 mb-4">
                <a href="DF72F2A6.html" class="menu-card card-citas">
                    <h3>DF72F2A6</h3>
                    <span class="btn-view">Ver Dashboard</span>
                </a>
            </div>

            <!-- Tarjeta 2: SIREC -->
            <div class="col-md-5 col-lg-4 mb-4">
                <a href="sirec.html" class="menu-card card-sirec">
                    <h3>SIREC</h3>
                    <span class="btn-view">Ver Dashboard</span>
                </a>
            </div>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
